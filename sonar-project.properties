sonar.projectKey=nats-chat
sonar.host.url=http://sonar.tkclabs.io:9000

# Source & test layout. Two languages live in one project:
#   - TypeScript MCP server under src/ (tests isolated under test/)
#   - Go TUI console under console/ (tests co-located as *_test.go)
# console/ is listed under BOTH sources and tests: the test.inclusions below
# claim *_test.go as test code, and the matching exclusion keeps those same
# files out of main analysis so a file is never indexed as both. This is the
# canonical SonarQube layout for Go's alongside-the-code test convention.
sonar.sources=src,console
sonar.tests=test,console
sonar.test.inclusions=test/**/*.test.ts,console/**/*_test.go

# Exclude build output, dependencies, generated/vendored files, and the Go test
# files (claimed as tests above) from main analysis. node_modules/** also covers
# the vendored Go file under node_modules/flatted/.
sonar.exclusions=dist/**,node_modules/**,**/*.js.map,console/**/*_test.go

# Coverage reports.
#   - JS/TS: produced by `npm run test:coverage` (@vitest/coverage-v8)
#   - Go: optional — generate with `cd console && go test -coverprofile=coverage.out ./...`
#     then uncomment the line below to feed it to Sonar.
sonar.javascript.lcov.reportPaths=coverage/lcov.info
# sonar.go.coverage.reportPaths=console/coverage.out

# Encoding
sonar.sourceEncoding=UTF-8
