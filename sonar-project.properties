sonar.projectKey=claude-connect-nats-mcp
sonar.host.url=http://sonar.tkclabs.io:9000

# Source & test layout
sonar.sources=src
sonar.tests=test
sonar.test.inclusions=test/**/*.test.ts

# Exclude build output and generated/vendored files from analysis
sonar.exclusions=dist/**,node_modules/**,**/*.js.map

# Coverage report (produced by `npm run test:coverage` -> @vitest/coverage-v8)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8
